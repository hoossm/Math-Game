<!DOCTYPE html>
<html lang="en">

<head>
    <title>Math Game</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <section id="game-section">
        <h1>Math Game</h1>
        <div>
            <div id="start-screen">
                <button id="start-btn">Start</button>
            </div>
            <div id="game-screen">
                <div id="score">Score: 10</div>
                <div id="question">1+2</div>
                <div id="answer">
                    <h2 id="mark">correct</h2>
                    <div id="playground">
                        Result =
                        <input type="text" id="user-input">
                        <button id="enter-btn">Enter</button>
                    </div>
                </div>
                <div id="timer">20s Left</div>
            </div>

        </div>
    </section>
    <script src="index.js"></script>
</body>

</html>
